<style>
    #rightControls {
        margin-left: auto;
    }

    #cardsControlsContainer .primary-button {
        width: auto;
    }

    #githubUserReport {
        width: 73%;
    }

    #githubUserReport h2 {
        margin: 0;
    }
    #aboutNameAndSocial {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: auto;
    }

    #cardsControlsContainer {
        width: 100%;
        display: flex;
        margin: var(--spacing-medium) auto var(--spacing-large) auto;
    }

    #aboutMe {
        background-image: url("assets/profile/main.jpg");
        background-size: cover; /* Ensures the image covers the entire element */
        background-repeat: no-repeat; /* Prevents the image from repeating */
        background-position: center; /* Centers the image within the element */
    }

</style>

<main class="content column-layout more-gap">

    <!-------------------------- About Section -------------------------->
    <section class="content homepage" id="aboutMe"> <!-- Only here for navbar to work -->
        <p> MANOJ MALVIYA </p>
        <!-- Introduction String -->
        <h1>
            solving problems with <strong>code</strong> and <strong>design</strong>
        </h1>
        <!-- Side Footer -->
        <div class="row-layout fit-content add-border">
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Linkedin', event)">
                <i class="bi bi-linkedin"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('GitHub', event)">
                <i class="bi bi-github"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Scholar', event)">
                <i class="bi bi-google"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Instagram', event)">
                <i class="bi bi-instagram"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Spotify', event)">
                <i class="bi bi-spotify"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Youtube', event)">
                <i class="bi bi-youtube"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('Apple', event)">
                <i class="bi bi-apple"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('SoundCloud', event)">
                <i class="bi bi-soundwave"></i>
            </button>
            <button class="primary-button smaller left-aligned"
                    onclick="loadSocialMediaLink('MixCloud', event)">
                <i class="bi bi-disc"></i>
            </button>
        </div>
        <!-- End of About Section -->
    </section>


    <!-------------------------- Work Experience Section -------------------------->
    <section class="content homepage" id="workExperience">
        <p> Career </p>
        <h1>
            solving problems with <strong>code</strong> and <strong>design</strong>
        </h1>
        <!-- About my career -->
        <div id="workList" class="grid-container" style="margin: var(--spacing-very-large) 0"></div>
    </section>

    <!-------------------------- Apps Section -------------------------->
    <section id="appAndGithub" class="content homepage">
        <p> Tools </p>
        <h1>
            solving problems with <strong>code</strong> and <strong>design</strong>
        </h1>
        <div class="row-layout">
            <div id="appList" class="grid-container" style="width: 37%;
                grid-template-columns: repeat(auto-fit, minmax(min-content, 1fr));">
                <!-- Will be dynamically added here -->
            </div>
            <div id="githubUserReport" class="column-layout" style="margin-left: auto;">
                <!-- GitHub Contributions -->
                <div class="row-layout">
                    <!--Year Buttons-->
                    <div id="yearButtons" class="tab-switcher"></div>
                    <!--Results Bar-->
                    <div class="row-layout">
                        <div class="tag-hero">
                            <p> Total Commits</p>
                            <h2 id="totalCommits">0 </h2>
                        </div>
                        <div class="tag-hero">
                            <p>Longest Streak </p>
                            <h2 id="longestStreak">0</h2>
                        </div>
                    </div>
                </div>
                <div id="githubHeatMap" class="plot"></div>
            </div>
        </div>
    </section>

    <!-------------------------- Project Section -------------------------->
    <section id="blogListings" class="content homepage">
        <p> Blogs </p>
        <h1>
            solving problems with <strong>code</strong> and <strong>design</strong>
        </h1>
        <div id="cardsControlsContainer">
            <div id="leftControls" class="row-layout">
                <!-- Sort Container -->
                <div id="sortDropdown" class="modern-dropdown" style="margin-right: var(--spacing-large)">
                    <button class="primary-button add-border modern-tooltip" data-tooltip="Sort blogs">
                        <i class="bi bi-sort-down-alt"></i>
                        <span class="button-label">Sort by...</span>
                    </button>
                    <ul id="sortFilterList" class="modern-dropdown-list hidden">
                    </ul>
                </div>

                <!-- Skill Container -->
                <div id="skillsFilter" class="modern-dropdown">
                    <button class="primary-button add-border modern-tooltip"
                            data-tooltip="Filter blogs by type of skills I employed">
                        <i class="bi bi-filter"></i>
                        <span class="button-label">Select Skills...</span>
                    </button>
                    <ul id="skillsList" class="modern-dropdown-list grid-3-cols hidden">
                        <li data-value="All" class="modern-dropdown-item">All Skills</li>
                    </ul>
                </div>
            </div>


            <div id="rightControls" class="row-layout">
                <!-- Search Container -->
                <div class="search-container" data-tooltip="Search blogs"
                     style="max-width: var(--magic-size);">
                    <button class="primary-button smaller" onclick="bringElementToFocus('search-input')">
                        <i class="bi bi-search"></i>
                    </button>
                    <input type="text" id="search-input" class="search-input" placeholder="Search..."
                           oninput="filterBlogsByKeywords()">
                </div>
            </div>
        </div>

        <div id="blogList" class="grid-container">
            <!-- The project cards will be dynamically inserted here -->
        </div>
    </section>
</main>
