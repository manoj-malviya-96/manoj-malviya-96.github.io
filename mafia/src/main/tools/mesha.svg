<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>{
    <!-- Gradient for the mesh lines -->
    <linearGradient id="triangleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5635E; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#723D3B; stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="black" />
  <!-- Triangular Mesh -->
  <path d="
    M100,100 L160,140 L140,160 Z
    M100,100 L40,140 L60,160 Z
    M60,160 L100,180 L140,160 Z"
        stroke="url(#triangleGradient)" fill="none" stroke-width="1.5" />
</svg>
